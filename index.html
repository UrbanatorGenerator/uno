<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uno Powersales Sales Assistant</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1c5070;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .uno-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; border: 2px solid #2a2a2a;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: #fdf9f3; }
    header h1 .sub { display: inline; font-size: 18px; font-weight: 700; color: #3b82f6; letter-spacing: -0.3px; }
    header h1 .beta { font-size: 11px; font-weight: 500; color: #fdf9f3; opacity: 0.55; letter-spacing: 0.3px; margin-left: 8px; vertical-align: middle; }

    .header-right { display: flex; align-items: center; gap: 16px; }
    .login-link {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
      padding: 5px 12px; transition: all .15s;
    }
    .login-link:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.35); }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #fdf9f3;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .refresh-btn {
      background: none; border: 1px solid #282828; color: #555;
      padding: 5px 12px; border-radius: 6px; font-size: 12px;
      cursor: pointer; transition: all .15s;
    }
    .refresh-btn:hover { border-color: #444; color: #aaa; }

    main { padding: 28px 32px; max-width: 1200px; width: 100%; }

    /* ── STAT CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .card {
      background: #141414; border: 1px solid #1e1e1e;
      border-radius: 10px; padding: 18px 20px;
    }
    .card-label {
      font-size: 11px; color: #555; text-transform: uppercase;
      letter-spacing: 0.6px; margin-bottom: 10px;
    }
    .card-value {
      font-size: 26px; font-weight: 700; color: #fff; line-height: 1;
    }
    .card-value.blue { color: #3b82f6; }
    .card-sub { font-size: 11px; color: #3a3a3a; margin-top: 6px; }

    /* ── CHARTS ── */
    .charts {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: #141414; border: 1px solid #1e1e1e;
      border-radius: 10px; padding: 20px 22px;
    }
    .chart-title {
      font-size: 11px; font-weight: 600; color: #444;
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 18px;
    }
    .chart-wrap { position: relative; height: 190px; }

    /* ── EMBEDDED CHAT SECTION ── */
    #uno-chat-section {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #e8e0d0;
      margin-bottom: 28px;
    }

    /* Hide floating toggle — we use embedded mode */
    .chat-window-toggle, [class*="chat-window-toggle"] { display: none !important; }

    /* Chat send button — page background color */
    #uno-chat-section button.chat-input-send-button,
    #uno-chat-section [class*="send-button"],
    #uno-chat-section button[type="submit"] {
      background: #1c5070 !important;
      background-color: #1c5070 !important;
    }
    #uno-chat-section button.chat-input-send-button svg,
    #uno-chat-section [class*="send-button"] svg { color: #fff !important; fill: #fff !important; }

    /* Cream white theme */
    .chat-body, [class*="chat-body"] { background: #fdf9f3 !important; }
    .chat-messages-list, [class*="messages-list"] { background: #fdf9f3 !important; }
    .chat-message.bot .chat-message-text { background: #ede8df !important; color: #1a1a1a !important; }
    .chat-message-text, [class*="message-text"] { color: #1a1a1a !important; }
    .chat-input-wrapper, [class*="chat-input"] { background: #fdf9f3 !important; border-top: 1px solid #e8e0d0 !important; }
    .chat-input textarea, .chat-input input { background: #fff !important; color: #111 !important; border: 1px solid #ddd5c5 !important; }

    /* Header */
    .chat-header, [class*="chat-header"] { background: #fdf9f3 !important; border-bottom: 1px solid #e8e0d0 !important; display: flex !important; flex-direction: row !important; align-items: center !important; gap: 12px !important; justify-content: flex-start !important; padding-left: 16px !important; }
    [class*="chat-header"] * { color: #1a1a1a !important; }
    .chat-header-text { display: flex; flex-direction: column; }
    .chat-heading { margin-bottom: 0 !important; }
    .chat-heading h1 { margin-bottom: 0 !important; line-height: 1 !important; font-size: 18px !important; }
    .chat-header > p { margin-top: 0 !important; line-height: 1 !important; }
    .chat-logo {
      width: 48px; height: 48px; border-radius: 6px;
      object-fit: cover; flex-shrink: 0;
    }

    /* Dynamic height — messages area grows */
    .chat-messages-list { min-height: 300px !important; max-height: none !important; }
    .n8n-chat { height: auto !important; min-height: 460px !important; }

    /* ── FOOTER ── */
    footer {
      padding: 8px 0;
      font-size: 13px;
      font-weight: 700;
      color: #fdf9f3;
      letter-spacing: 0.3px;
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: space-between;
      align-items: center;
    }
    .stats-link {
      font-size: 13px;
      font-weight: 700;
      color: #fdf9f3;
      text-decoration: none;
      opacity: 0.75;
      transition: opacity .15s;
    }
    .stats-link:hover { opacity: 1; }

    /* Market ticker */
    .ticker-bar {
      background: #bc282f;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      height: 30px;
      overflow: hidden;
      display: flex;
      align-items: center;
      width: 100%;
      position: fixed;
      bottom: 0;
      left: 0;
      z-index: 100;
      letter-spacing: 0.2px;
    }
    .ticker-track {
      display: inline-flex;
      align-items: center;
      gap: 24px;
      white-space: nowrap;
      animation: ticker-scroll 75s linear infinite;
      padding-left: 100%;
    }
    @keyframes ticker-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    .ticker-bar:hover .ticker-track { animation-play-state: paused; }
    .ticker-item { display: inline-flex; gap: 6px; }
    .ticker-sep { opacity: 0.4; font-size: 30px; line-height: 30px; }
    .tv { font-weight: 400; }
    .tv.up   { color: #90ee90; }
    .tv.down { color: #ffffff; opacity: 0.85; }
    body { padding-bottom: 30px; }

    /* ── CHAT STARTERS ── */
    .chat-starters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 16px 4px;
    }
    .chat-starter-btn {
      background: #fff;
      border: 1.5px solid #1c5070;
      color: #1c5070;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .chat-starter-btn:hover {
      background: #1c5070;
      color: #fff;
    }

    /* ── ERROR ── */
    .error-msg {
      font-size: 13px; color: #ef4444; padding: 12px 0;
    }

    /* ── RESPONSIVE MOBILE ── */
    @media (max-width: 640px) {
      main { padding: 16px 14px; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      .charts { grid-template-columns: 1fr; }
    }

    /* ── n8n CHAT OVERRIDES ── */
    :root {
      --chat--color-primary: #1c5070;
      --chat--color-primary-shade-50: #174260;
      --chat--color-primary-shade-100: #123450;
      --chat--color-secondary: #1c5070;
      --chat--color-secondary-shade-50: #174260;
      --chat--window--width: 100%;
      --chat--window--height: auto;
      --chat--header--background: #fdf9f3;
      --chat--header--color: #1a1a1a;
      --chat--message--bot--background: #ede8df;
      --chat--message--bot--color: #1a1a1a;
      --chat--message--user--background: #3b82f6;
      --chat--message--user--color: #fff;
      --chat--background: #fdf9f3;
      --chat--input--background: #fff;
      --chat--input--border-color: #ddd5c5;
      --chat--input--color: #111;
      --chat--toggle--background: #3b82f6;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="Uno_lowres2.png" alt="Uno" class="uno-avatar" onerror="this.style.display='none'" />
    <h1>Uno <span class="sub">Powersales Assistant <span class="beta">currently in beta testing</span></span></h1>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> Live</div>
    <a href="#" class="login-link">Log in for full access</a>
  </div>
</header>

<main>
  <div id="uno-chat-section"></div>

  <div id="error" class="error-msg" style="display:none;"></div>

  <footer>
    <span>Powered by Powersales — 2026</span>
    <a href="statistics.html" class="stats-link">Statistics</a>
  </footer>
</main>

<div class="ticker-bar">
  <div class="ticker-track" id="tickerTrack">
    <span class="ticker-item">S&amp;P 500 <span class="tv" id="t-spx">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">FTSE 100 <span class="tv" id="t-ftse">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">DAX <span class="tv" id="t-dax">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">OMXSPI <span class="tv" id="t-omxspi">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">OMXS30 <span class="tv" id="t-omxs30">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">NIKKEI <span class="tv" id="t-nikkei">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">EUR/USD <span class="tv" id="t-eurusd">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">GBP/USD <span class="tv" id="t-gbpusd">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">EUR/CHF <span class="tv" id="t-eurchf">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">EUR/JPY <span class="tv" id="t-eurjpy">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">USD/CHF <span class="tv" id="t-usdchf">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">USD/JPY <span class="tv" id="t-usdjpy">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">USD/SEK <span class="tv" id="t-usdsek">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">USD/DKK <span class="tv" id="t-usddkk">—</span></span>
    <span class="ticker-sep">·</span>
    <span class="ticker-item">USD/NOK <span class="tv" id="t-usdnok">—</span></span>
  </div>
</div>

<script>
  // Show thinking message 15s after user sends a message (no fetch wrapping)
  let thinkTimer = null;
  let lastMsgCount = 0;
  document.addEventListener('DOMContentLoaded', () => {
    const observer = new MutationObserver(() => {
      const msgList = document.querySelector('.chat-messages-list');
      if (!msgList) return;
      const msgs = msgList.querySelectorAll('.chat-message');
      const count = msgs.length;
      if (count === lastMsgCount) return;
      lastMsgCount = count;
      const last = msgs[count - 1];

      // Detect bot reply: has any class containing "bot", "assistant", "agent", or "system"
      const isBotMsg = [...last.classList].some(c =>
        /bot|assistant|agent|system/i.test(c)
      );

      if (!isBotMsg && count > 0) {
        // Likely a user message — hide starters + start thinking timer
        document.querySelectorAll('.chat-starters').forEach(e => e.remove());
        clearTimeout(thinkTimer);
        document.querySelectorAll('.uno-thinking').forEach(e => e.remove());
        thinkTimer = setTimeout(() => {
          if (msgList.querySelector('.uno-thinking')) return;
          const el = document.createElement('div');
          el.className = 'uno-thinking';
          el.style.cssText = 'font-style:italic; font-size:13px; padding:6px 14px; margin:4px 0; color:#000000; opacity:0.85;';
          el.textContent = '⏳ I\'m digging into this — expert queries can take up to 60 seconds.';
          msgList.appendChild(el);
          msgList.scrollTop = msgList.scrollHeight;
        }, 15000);
      } else {
        // Bot replied — clear timer and thinking message
        clearTimeout(thinkTimer);
        document.querySelectorAll('.uno-thinking').forEach(e => e.remove());
      }
    });
    const tryObserve = setInterval(() => {
      const msgList = document.querySelector('.chat-messages-list');
      if (msgList) { observer.observe(msgList, { childList: true, subtree: true }); clearInterval(tryObserve); }
    }, 300);
  });
</script>

<script type="module">
  import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

  function injectChatLogo() {
    const header = document.querySelector('#uno-chat-section .chat-header');
    if (header && !header.querySelector('.chat-logo')) {
      const logo = document.createElement('img');
      logo.src = 'PSC ny logo.jpg';
      logo.className = 'chat-logo';
      logo.alt = 'Powersales';
      header.insertBefore(logo, header.firstChild);
    }
  }
  // Poll until chat header is rendered
  const logoTimer = setInterval(() => {
    injectChatLogo();
    if (document.querySelector('#uno-chat-section .chat-logo')) clearInterval(logoTimer);
  }, 200);

  const STARTERS = [
    'What can you help me with?',
    'For best advice address my Experts.',
    'Help me with a great sales letter.'
  ];

  function sendStarterMessage(text) {
    const section = document.querySelector('#uno-chat-section');
    const textarea = section && section.querySelector('textarea');
    const sendBtn  = section && section.querySelector('button[type="submit"], .chat-input-send-button, button.send');
    if (!textarea) return;
    // Set value and trigger Vue reactivity
    const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value').set;
    nativeInputValueSetter.call(textarea, text);
    textarea.dispatchEvent(new Event('input', { bubbles: true }));
    // Click send after short delay
    setTimeout(() => {
      if (sendBtn) sendBtn.click();
      else textarea.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true }));
      // Hide starters after use
      const starters = document.querySelector('.chat-starters');
      if (starters) starters.remove();
    }, 50);
  }

  function injectChatStarters() {
    const section = document.querySelector('#uno-chat-section');
    if (!section || section.querySelector('.chat-starters')) return;
    const inputArea = section.querySelector('.chat-inputs, .chat-input, form');
    if (!inputArea) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'chat-starters';
    STARTERS.forEach(text => {
      const btn = document.createElement('button');
      btn.className = 'chat-starter-btn';
      btn.textContent = text;
      btn.addEventListener('click', () => sendStarterMessage(text));
      wrapper.appendChild(btn);
    });
    inputArea.parentNode.insertBefore(wrapper, inputArea);
  }

  const startersTimer = setInterval(() => {
    injectChatStarters();
    if (document.querySelector('.chat-starters')) clearInterval(startersTimer);
  }, 200);

  createChat({
    webhookUrl: 'https://urbanator25.app.n8n.cloud/webhook/cb38e6b8-379b-4791-b161-7e79e148f0e2/chat',
    mode: 'fullscreen',
    target: '#uno-chat-section',
    chatInputKey: 'chatInput',
    chatSessionKey: 'sessionId',
    allowFileUploads: true,
    initialMessages: ['Hello, Uno here. How can I help you today?'],
    i18n: {
      en: {
        title: 'Uno',
        subtitle: 'Your Personal Sales Assistant',
        inputPlaceholder: 'Write a message...',
        getStarted: 'New chat',
        closeButtonTooltip: 'Close',
      }
    }
  });
</script>

<script>
  // Statistics moved to statistics.html
</script>

<script>
(function() {
  function setTicker(id, price, change) {
    const el = document.getElementById(id);
    if (!el) return;
    if (change === undefined || change === null) { el.textContent = price; el.className = 'tv'; return; }
    const sign = change >= 0 ? '+' : '';
    el.textContent = sign + change.toFixed(2) + '%';
    el.className = 'tv ' + (change >= 0 ? 'up' : 'down');
  }

  async function loadTicker() {
    try {
      const r = await fetch('market-data.json?t=' + Date.now());
      const d = await r.json();
      const keys = ['spx','ftse','dax','omxspi','omxs30','nikkei','eurusd','gbpusd','eurchf','eurjpy','usdchf','usdjpy','usdsek','usddkk','usdnok'];
      keys.forEach(k => { if (d[k]) setTicker('t-'+k, d[k].price, d[k].change ?? null); });
    } catch(e) { console.error('Ticker error:', e); }
  }
  document.addEventListener('DOMContentLoaded', loadTicker);
  setInterval(loadTicker, 15 * 60 * 1000);
})();
</script>
</body>
</html>
